# Supabase project configuration that is safe to push to the linked BitLink project.
# Keep Auth URLs explicit so production confirmation emails never fall back to localhost.
project_id = "BitLink"

[auth]
enabled = true
site_url = "https://bitlink.co.il"
additional_redirect_urls = [
  "https://bitlink.co.il/auth/callback",
  "https://www.bitlink.co.il/auth/callback",
  "https://bitlink.co.il/auth/confirm",
  "https://www.bitlink.co.il/auth/confirm",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/confirm",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 6
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.sms.twilio]
enabled = false
account_sid = ""
message_service_sid = ""
auth_token = "env(SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN)"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
otp_length = 6
template = "Your code is {{ .Code }}"
max_frequency = "5s"
